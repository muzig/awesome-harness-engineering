name: Link Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --exclude '^https://openai\.com/index/harness-engineering/?$'
            --exclude '^https://platform\.openai\.com/docs/guides/agent-evals/?$'
            --exclude '^https://platform\.openai\.com/docs/guides/evaluation-best-practices/?$'
            --exclude '^https://platform\.openai\.com/docs/guides/trace-grading/?$'
            README.md
            CONTRIBUTING.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
